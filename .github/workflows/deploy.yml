name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/PerfEval
            git pull

            # Ensure Gemini API key exists in GitHub Secrets
            if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
              echo "GEMINI_API_KEY secret is missing in GitHub repository secrets."
              exit 1
            fi

            # Pass key directly to docker compose env substitution (no sed/.env escaping issues)
            export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'

            # Use base + prod override compose files
            sudo --preserve-env=GEMINI_API_KEY docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build app

            # Optional: show status in Actions logs
            sudo --preserve-env=GEMINI_API_KEY docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
